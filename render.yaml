services:
  # Backend service
  - type: web
    name: ortho-wallet-backend
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn ortho_wallet.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ortho-wallet-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.8

  # Frontend service
  - type: web
    name: ortho-wallet-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://ortho-wallet-backend.onrender.com/api
      - key: NODE_VERSION
        value: 18.17.0

databases:
  - name: ortho-wallet-db
    databaseName: ortho_wallet
    user: ortho_wallet_user