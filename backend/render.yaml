services:
  # Backend API Service
  - type: web
    name: ortho-wallet-backend
    runtime: python
    # Remove rootDir since we're already in backend folder
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn ortho_wallet.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ortho-wallet-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: JWT_SECRET_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USE_TLS
        value: true
      - key: EMAIL_HOST_USER
        value: tasdidanpreome@gmail.com
      - key: EMAIL_HOST_PASSWORD
        sync: false

databases:
  - name: ortho-wallet-db
    databaseName: ortho_wallet
    user: ortho_wallet_user
    plan: free